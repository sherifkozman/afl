name: Feature request
description: Suggest an improvement
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: why
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: Risks / tradeoffs
      description: Any possible downsides?
    validations:
      required: false
